name: DAST - OWASP ZAP

on:
  push:
    branches: [ main ]          # only run on main — DAST is slower, skip on every PR
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'         # every Monday at 2am — weekly full scan

jobs:
  zap:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Start Juice Shop as the target application
      - name: Start Juice Shop (target app)
        run: |
          docker pull bkimminich/juice-shop
          docker run -d -p 3000:3000 --name juice-shop bkimminich/juice-shop
          echo "Waiting for Juice Shop to be ready..."
          sleep 20
          curl --retry 10 --retry-delay 3 http://localhost:3000 > /dev/null 2>&1
          echo "Juice Shop is up!"

      - name: Create reports directory
        run: mkdir -p reports

      - name: Fix permissions for ZAP
        run: chmod -R 777 $GITHUB_WORKSPACE

      # ZAP Baseline scan — fast, passive scan only (~2 min)
      # Good for PRs and daily runs
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://localhost:3000
          # rules_file_name: .zap/rules.tsv     # our custom false-positive rules (Week 3)
          cmd_options: '-J reports/baseline-report.json'
          fail_action: false
        continue-on-error: true

      # ZAP Full scan — active scan, finds more but takes ~15 min
      # Only rus on schedule (weekly), not every push
      - name: Run ZAP Full Scan (weekly)
        if: github.event_name == 'schedule'
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: http://localhost:3000
          cmd_options: '-J reports/zap-full-report.json'
          fail_action: false
        continue-on-error: true

      - name: Upload ZAP reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path : reports/
          retention-days: 30